name: build addon

on:
  push:
    tags:["*"]
    # To build on main/master branch, uncomment the following line:
    # branches:[ main , master ]

  pull_request:
    branches: [ main, master ]

  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to update (e.g., 1.0). Leave empty to use the branch/tag you triggered from.'
        required: false
        type: string

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Set up Python
      run: uv python install

    - name: Install dependencies in Virtual Environment
      run: |
        sudo apt-get update -y
        sudo apt-get install -y gettext
        uv venv
        echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH
        uv pip install Markdown scons pre-commit ruff

    - name: building addon
      run: scons && scons pot

    - uses: actions/upload-artifact@v7
      with:
        name: packaged_addon
        path: |
          ./*.nvda-addon
          ./*.pot

  upload_release:
    runs-on: ubuntu-latest
    # Only run if it's a tag push, OR if triggered manually and a tag is explicitly provided
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.tag_name != '')
    needs: ["build"]
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v6

    - name: download releases files
      uses: actions/download-artifact@v8

    - name: Display structure of downloaded files
      run: ls -R

    - name: Calculate sha256
      run: |
        echo -e "\nSHA256: " >> changelog.md
        sha256sum *.nvda-addon >> changelog.md

    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        # Uses your manual input if provided, otherwise falls back to the tag that triggered the workflow
        tag_name: ${{ inputs.tag_name || github.ref_name }}
        files: |
          *.nvda-addon
          *.pot
        body_path: changelog.md
        fail_on_unmatched_files: true
        # Properly flags as a prerelease if a hyphen is in the input or the ref
        prerelease: ${{ contains(inputs.tag_name, '-') || contains(github.ref, '-') }}